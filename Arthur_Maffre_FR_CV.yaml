cv:
  name: Arthur Maffre
  location: Montréal, QC
  email: maffrearthur@gmail.com
  phone: +1-514-501-7206
  website:
  social_networks:
    - network: LinkedIn
      username: arthur-maffre
    - network: GitHub
      username: arthurmaffre
  sections:
    Points forts:
      - bullet: Conception de systèmes intelligents à impact concret
      - bullet: Finaliste au **Hackathon McGill-FIAM** | 3e place au **Datathon de Polytechnique**
      - bullet: Faire le pont entre la **théorie de l'IA** et les applications concrètes
    À propos de moi:
      - 'Étudiant à la maîtrise à **Mila** (Université de Montréal), je conçois des systèmes intelligents qui repoussent les **frontières de l''optimisation** et de la prise de décision. J''explore actuellement des architectures fondées sur les **GFlowNet**.'
    education:
      - institution: Université de Montréal - Mila
        area: Informatique
        degree: M.Sc.
        date:
        start_date: 2025-09
        end_date: 2027-08
        location: Montréal, QC, CA
        highlights:
          - Recherche sur les **GFlowNet**
          - Axée sur l'apprentissage par renforcement, l'**optimisation combinatoire** et la planification en IA
      - institution: Université de Montréal
        area: Sciences économiques - Programme Honours
        degree: B.Sc.
        date:
        start_date: 2022-09
        end_date: 2025-08
        location: Montréal, QC, CA
        summary:
        highlights:
          - Assistant de recherche sur un projet supervisé par le Prof. Arbour
          - Travail en collaboration avec la juge en chef de la Cour supérieure du Québec *(**bourse de recherche IQRDJ de 5 000 $**) sur la modélisation des **dépenses des institutions publiques***
          - Auxiliaire d'enseignement pour * **Microéconomie I** (ECN-2040)*, un cours **fondamental** de 2e année au premier cycle*
          - '**Moyenne :** 3,825/4,3'
    projets de recherche:
      - name: '[Tarification bilatérale avec GFlowNet](https://www.researchgate.net/publication/392064095_ECN_6338_Knapsack_GFlowNet)'
        date:
        start_date: 2025-03
        end_date: 2025-09
        location:
        summary: Mémoire Honours – Université de Montréal (2024–2025)
        highlights:
          - Formulation d'un modèle de tarification bilatérale où les consommateurs résolvent un problème de sac à dos pour maximiser leur utilité
          - Utilisation de GFlowNets avec **Critic** pour simuler la réponse des consommateurs et améliorer la stratégie de tarification du meneur
          - Intégration de la programmation en nombres entiers mixtes avec la dynamique des flux génératifs
      - name: '[Transformer-GFlowNet pour l''optimisation séquentielle de portefeuille](https://github.com/arthurmaffre/RMBP_finance)'
        date:
        start_date: 2024-06
        end_date: present
        location:
        summary: Finaliste – Hackathon McGill-FIAM 2024
        highlights:
          - Développement d'un modèle fondé sur les **Transformers** pour générer des vecteurs d'allocation d'actifs
          - Modélisation des coûts de transaction, des contraintes de rotation et de l'optimisation du **ratio de Sharpe dynamique**
    compétences techniques:
      - label: Langages
        details: Python (avancé), LaTeX, Markdown, Bash, C (notions), Rust (débutant)
      - label: Cadres d'apprentissage automatique et d'optimisation
        details: PyTorch, Lightning AI, HuggingFace
      - label: Modèles
        details: 'Apprentissage par renforcement (PPO, A2C), GFlowNet, PINNs, XGBoost'
      - label: Outils et environnement de développement
        details: 'Git, Conda, Docker, JupyterLab'
    Concours:
      - name: '[Hackathon de gestion d''actifs McGill-FIAM - Finaliste](#)'
        date: 2024-11
        start_date:
        end_date:
        location: Montréal
        highlights:
          - Top 10 sur 66 équipes
          - Conception d'un modèle **Portfolio Transformer** qui produit directement des actions d'allocation plutôt que des prédictions
          - La fonction objectif était le **ratio de Sharpe**, optimisé dynamiquement sous contraintes de coûts de transaction
          - Présentation devant un jury de professeurs de finance et de professionnels de l'industrie
      - name: '[Datathon de Polytechnique Montréal - 3e place](#)'
        date: 2024-12
        start_date:
        end_date:
        location: Montréal
        summary:
        highlights:
          - Conception d'un système d'IA pour générer des **rapports financiers** et des commentaires à partir de données brutes
          - Axé sur la génération de langage financier, l'analytique et la présentation visuelle des résultats
          - 'Prix de **500 $** remporté'
    experience:
      - company: Brasserie Henri - Hôtel Birks
        position: Aide-serveur – Gastronomie
        start_date: 2023-08
        end_date: 2023-12
        location: Montréal, QC
        summary: Service haut de gamme dans un environnement de restaurant de luxe au rythme soutenu
        highlights:
          - Maintien d'une satisfaction client exceptionnelle lors de services sous pression
          - Développement du souci du détail, de la **communication** et de l'esprit d'équipe
      - company: Restaurant Sabrosa
        position: Aide-serveur
        start_date: 2023-04
        end_date: 2023-08
        location: Montréal, QC
        summary: Soutien au service en salle dans un cadre de restauration décontractée
        highlights:
          - Gestion de plusieurs tables et coordination avec le personnel de cuisine sous pression
          - Développement de compétences interpersonnelles et de **polyvalence** applicables aux rôles en contact avec la clientèle
    langues:
      - label: Français
        details: Langue maternelle
      - label: Anglais
        details: Courant
    activites_parascolaires:
      - bullet: Passionné de musculation et de **discipline** en salle — la constance construit le corps et l'état d'esprit
      - bullet: J'aime travailler sur des projets techniques personnels, en particulier autour de l'IA, de l'optimisation et de la simulation
      - bullet: Passionné par l'interaction humaine, j'accorde de l'importance à l'écoute active et à la construction de relations solides au travail.

design:
  theme: classic
  page:
    size: us-letter
    top_margin: 2cm
    bottom_margin: 2cm
    left_margin: 2cm
    right_margin: 2cm
    show_page_numbering: true
    show_last_updated_date: true
  colors:
    text: rgb(0, 0, 0)
    name: rgb(0, 79, 144)
    connections: rgb(0, 79, 144)
    section_titles: rgb(0, 79, 144)
    links: rgb(0, 79, 144)
    last_updated_date_and_page_numbering: rgb(128, 128, 128)
  text:
    font_family: Source Sans 3
    font_size: 10pt
    leading: 0.7em
    alignment: justified
    date_and_location_column_alignment: right
  links:
    underline: false
    use_external_link_icon: true
  header:
    name_font_family: Source Sans 3
    name_font_size: 31pt
    name_bold: true
    photo_width: 3.5cm
    vertical_space_between_name_and_connections: 0.82cm
    vertical_space_between_connections_and_first_section: 0.82cm
    horizontal_space_between_connections: 0.45cm
    connections_font_family: Source Sans 3
    separator_between_connections: '|'
    use_icons_for_connections: true
    alignment: center
  section_titles:
    type: with-parial-line
    font_family: Source Sans 3
    font_size: 1.4em
    bold: true
    small_caps: false
    line_thickness: 1pt
    vertical_space_above: 0.5cm
    vertical_space_below: 0.3cm
  entries:
    date_and_location_width: 4.15cm
    left_and_right_margin: 0.5cm
    horizontal_space_between_columns: 0.1cm
    vertical_space_between_entries: 1.2em
    allow_page_break_in_sections: true
    allow_page_break_in_entries: true
    short_second_row: false
    show_time_spans_in: []
  highlights:
    bullet: •
    top_margin: 0.25cm
    left_margin: 0.3cm
    vertical_space_between_highlights: 0.25cm
    horizontal_space_between_bullet_and_highlight: 0.5em
    summary_left_margin: 0cm
  entry_types:
    one_line_entry:
      template: '**LABEL:** DETAILS'
    education_entry:
      main_column_first_row_template: '**INSTITUTION**, AREA'
      degree_column_template: '**DEGREE**'
      degree_column_width: 0.8cm
      main_column_second_row_template: |-
        SUMMARY
        HIGHLIGHTS
      date_and_location_column_template: |-
        LOCATION
        DATE
    normal_entry:
      main_column_first_row_template: '**NAME**'
      main_column_second_row_template: |-
        SUMMARY
        HIGHLIGHTS
      date_and_location_column_template: |-
        LOCATION
        DATE
    experience_entry:
      main_column_first_row_template: '**COMPANY**, POSITION'
      main_column_second_row_template: |-
        SUMMARY
        HIGHLIGHTS
      date_and_location_column_template: |-
        LOCATION
        DATE
    publication_entry:
      main_column_first_row_template: '**TITLE**'
      main_column_second_row_template: |-
        AUTHORS
        URL (JOURNAL)
      main_column_second_row_without_journal_template: |-
        AUTHORS
        URL
      main_column_second_row_without_url_template: |-
        AUTHORS
        JOURNAL
      date_and_location_column_template: DATE
